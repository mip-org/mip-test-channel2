name: Add package

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  initial-response:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Verify issue title
        id: check
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          title_trimmed=$(printf '%s' "$ISSUE_TITLE" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          title_lower=$(printf '%s' "$title_trimmed" | tr '[:upper:]' '[:lower:]')
          title_is_url=false
          if printf '%s' "$title_trimmed" | grep -qE '^https://github\.com/[^/[:space:]]+/[^/[:space:]]+/tree/[^[:space:]]+$'; then
            title_is_url=true
          fi
          if [ "$title_is_url" = "true" ] || printf '%s' "$title_lower" | grep -qE '^add package($|[^a-z])'; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "title_is_url=$title_is_url" >> "$GITHUB_OUTPUT"
            echo "title_trimmed=$title_trimmed" >> "$GITHUB_OUTPUT"
          else
            echo "Issue title is neither 'add package …' nor a conforming URL — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v4

      - name: Prepend URL into issue body
        if: steps.check.outputs.proceed == 'true' && steps.check.outputs.title_is_url == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          TITLE_URL: ${{ steps.check.outputs.title_trimmed }}
        run: |
          mkdir -p .ci-tmp
          if printf '%s' "$ISSUE_BODY" | grep -qF -- "$TITLE_URL"; then
            echo "URL already present in body — leaving body alone."
            exit 0
          fi
          { printf '%s\n\n' "$TITLE_URL"; printf '%s' "$ISSUE_BODY"; } > .ci-tmp/new_body.txt
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --body-file .ci-tmp/new_body.txt

      - name: Build validation comment
        if: steps.check.outputs.proceed == 'true'
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .ci-tmp
          python3 scripts/add_packages_from_issue.py validate \
            --output-file .ci-tmp/comment.md \
            --names-file .ci-tmp/names.txt

      - name: Post validation comment
        if: steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file .ci-tmp/comment.md

      - name: Rewrite title to canonical form
        if: steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          if [ ! -s .ci-tmp/names.txt ]; then
            echo "No parsed package names — leaving title alone."
            exit 0
          fi
          joined=""
          sep=""
          any=false
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            joined+="${sep}\`${line}\`"
            sep=", "
            any=true
          done < .ci-tmp/names.txt
          if [ "$any" != "true" ]; then
            echo "No non-empty names — leaving title alone."
            exit 0
          fi
          new_title="Add package: $joined"
          if [ "$ISSUE_TITLE" = "$new_title" ]; then
            echo "Title already canonical — no edit needed."
            exit 0
          fi
          gh issue edit "$ISSUE_NUMBER" --repo "$REPO" --title "$new_title"

  add-package:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      contains(fromJSON('["magland", "danfortunato"]'), github.event.comment.user.login)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Verify trigger conditions
        id: check
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          title_trimmed=$(printf '%s' "$ISSUE_TITLE" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
          title_lower=$(printf '%s' "$title_trimmed" | tr '[:upper:]' '[:lower:]')
          title_is_url=false
          if printf '%s' "$title_trimmed" | grep -qE '^https://github\.com/[^/[:space:]]+/[^/[:space:]]+/tree/[^[:space:]]+$'; then
            title_is_url=true
          fi
          if [ "$title_is_url" != "true" ] && ! printf '%s' "$title_lower" | grep -qE '^add package($|[^a-z])'; then
            echo "Issue title is neither 'add package …' nor a conforming URL — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! printf '%s\n' "$COMMENT_BODY" | tr -d '\r' | grep -iqE '^[[:space:]]*approve[[:space:]]*$'; then
            echo "Comment does not contain 'approve' on its own line — skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.MIP_SYNC_TOKEN }}

      - name: Process package URLs
        if: steps.check.outputs.proceed == 'true'
        id: process
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .ci-tmp
          python3 scripts/add_packages_from_issue.py apply \
            --report-file .ci-tmp/report.md \
            --errors-file .ci-tmp/errors.md \
            --repo-root .
          if git status --porcelain | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.proceed == 'true' && steps.process.outputs.has_changes == 'true'
        id: commit
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Add packages from issue #${ISSUE_NUMBER}"
          git push origin HEAD:main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Report back to issue
        if: always() && steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          HAS_CHANGES: ${{ steps.process.outputs.has_changes }}
          PUSHED: ${{ steps.commit.outputs.pushed }}
          PROCESS_RESULT: ${{ steps.process.outcome }}
          COMMIT_RESULT: ${{ steps.commit.outcome }}
        run: |
          report=""
          errors=""
          if [ -f .ci-tmp/report.md ]; then
            report=$(cat .ci-tmp/report.md)
          fi
          if [ -f .ci-tmp/errors.md ]; then
            errors=$(cat .ci-tmp/errors.md)
          fi

          body=""
          if [ -n "$report" ]; then
            body+=$'**Added packages:**\n'"$report"$'\n'
          fi
          if [ -n "$errors" ]; then
            body+=$'\n**Errors:**\n'"$errors"$'\n'
          fi
          if [ "$PUSHED" = "true" ]; then
            body+=$'\nChanges pushed to `main`.\n'
          elif [ "$HAS_CHANGES" = "true" ] && [ "$COMMIT_RESULT" != "success" ]; then
            body+=$'\nFailed to commit/push changes — see the workflow run for details.\n'
          elif [ "$PROCESS_RESULT" != "success" ]; then
            body+=$'\nWorkflow failed before changes could be applied — see the workflow run for details.\n'
          else
            body+=$'\nNo changes were applied.\n'
          fi

          gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "$body"
