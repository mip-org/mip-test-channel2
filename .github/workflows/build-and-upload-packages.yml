name: Build and Upload Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Install and switch to GCC 10
        run: |
          sudo apt update
          sudo apt install -y gcc-10 g++-10
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100 --slave /usr/bin/g++ g++ /usr/bin/g++-10
          sudo update-alternatives --set gcc /usr/bin/gcc-10
        shell: bash

      - name: Verify GCC version
        run: gcc --version

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip-package-manager
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip-package-manager
          path: mip-package-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true
          release: R2022a

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: linux_x86_64
        run: python scripts/prepare_packages.py

      - name: Bundle packages with mip
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: linux_x86_64
        with:
          command: "addpath('mip-package-manager'); addpath('scripts'); bundle_packages"

      - name: Upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

  build-macos-intel:
    runs-on: macos-15-intel

    steps:
      - name: Make alias for gfortran
        run: |
          gfortran-15 --version
          ln -s /usr/local/bin/gfortran-15 /usr/local/bin/gfortran
          gfortran --version

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip-package-manager
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip-package-manager
          path: mip-package-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: macos_x86_64
        run: python scripts/prepare_packages.py

      - name: Bundle packages with mip
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: macos_x86_64
        with:
          command: "addpath('mip-package-manager'); addpath('scripts'); bundle_packages"

      - name: Upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Make alias for gfortran
        run: |
          gfortran-15 --version
          ln -s /opt/homebrew/bin/gfortran-15 /opt/homebrew/bin/gfortran
          gfortran --version

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip-package-manager
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip-package-manager
          path: mip-package-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: macos_arm64
        run: python scripts/prepare_packages.py

      - name: Bundle packages with mip
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: macos_arm64
        with:
          command: "addpath('mip-package-manager'); addpath('scripts'); bundle_packages"

      - name: Upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

  build-numbl-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip-package-manager
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip-package-manager
          path: mip-package-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Verify Emscripten
        run: emcc --version

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: numbl_wasm
        run: python scripts/prepare_packages.py

      - name: Bundle packages with mip
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: numbl_wasm
        with:
          command: "addpath('mip-package-manager'); addpath('scripts'); bundle_packages"

      - name: Upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

  build-numbl-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-10 g++-10 libfftw3-dev libopenblas-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100 --slave /usr/bin/g++ g++ /usr/bin/g++-10
          sudo update-alternatives --set gcc /usr/bin/gcc-10
        shell: bash

      - name: Verify GCC version
        run: gcc --version

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip-package-manager
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip-package-manager
          path: mip-package-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: numbl_linux_x86_64
        run: python scripts/prepare_packages.py

      - name: Bundle packages with mip
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: numbl_linux_x86_64
        with:
          command: "addpath('mip-package-manager'); addpath('scripts'); bundle_packages"

      - name: Upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

  build-numbl-macos-intel:
    runs-on: macos-15-intel

    steps:
      - name: Install system dependencies
        run: brew install fftw openblas

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip-package-manager
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip-package-manager
          path: mip-package-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: numbl_macos_x86_64
        run: python scripts/prepare_packages.py

      - name: Bundle packages with mip
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: numbl_macos_x86_64
        with:
          command: "addpath('mip-package-manager'); addpath('scripts'); bundle_packages"

      - name: Upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

  build-numbl-macos:
    runs-on: macos-latest

    steps:
      - name: Install system dependencies
        run: brew install fftw openblas

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip-package-manager
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip-package-manager
          path: mip-package-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: numbl_macos_arm64
        run: python scripts/prepare_packages.py

      - name: Bundle packages with mip
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: numbl_macos_arm64
        with:
          command: "addpath('mip-package-manager'); addpath('scripts'); bundle_packages"

      - name: Upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

  build-any:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout mip-package-manager
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip-package-manager
          path: mip-package-manager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          cache: true

      - name: Install Python dependencies
        run: pip install requests pyyaml

      - name: Prepare packages
        env:
          BUILD_ARCHITECTURE: any
        run: python scripts/prepare_packages.py

      - name: Bundle packages with mip
        uses: matlab-actions/run-command@v2
        env:
          BUILD_ARCHITECTURE: any
        with:
          command: "addpath('mip-package-manager'); addpath('scripts'); bundle_packages"

      - name: Upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/upload_packages.py

  assemble-index:
    runs-on: ubuntu-latest
    needs: [build-any, build-linux, build-macos, build-macos-intel, build-numbl-wasm, build-numbl-linux, build-numbl-macos-intel, build-numbl-macos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Assemble package index
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/assemble_index.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/gh-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: assemble-index
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
