name: Sync from template

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MIP_SYNC_TOKEN }}

      - name: Checkout template repository
        uses: actions/checkout@v4
        with:
          repository: mip-org/mip-channel-template
          path: _template

      - name: Sync files from template
        run: |
          cp _template/.gitignore .gitignore
          cp _template/README.md README.md
          cp _template/.github/workflows/*.yml .github/workflows/
          cp _template/scripts/* scripts/
          rm -rf _template

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync from mip-channel-template"
          git push
